
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
#sg-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 1rem 0 1.5rem; font-family: var(--font-sans); user-select: none; -webkit-user-select: none; }
#sg-hud { display: flex; gap: 24px; }
.sg-stat { text-align: center; }
.sg-label { font-size: 11px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.08em; }
.sg-value { font-size: 21px; font-weight: 500; color: var(--color-text-primary); font-variant-numeric: tabular-nums; }
#sg-canvas { border-radius: 14px; border: 1.5px solid #00ff8840; display: block; touch-action: none; image-rendering: pixelated; }
#sg-msg { font-size: 13px; color: var(--color-text-secondary); min-height: 18px; text-align: center; }
#sg-btns { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
#sg-btns button { padding: 6px 16px; font-size: 13px; border-radius: 8px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-primary); cursor: pointer; transition: background 0.1s, transform 0.08s; }
#sg-btns button:hover { background: var(--color-background-tertiary); }
#sg-btns button:active { transform: scale(0.94); }
#sg-levels { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: center; }
#sg-levels span { font-size: 12px; color: var(--color-text-secondary); margin-right: 2px; }
.lvl-btn { padding: 4px 12px; font-size: 12px; border-radius: 6px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-secondary); cursor: pointer; transition: all 0.1s; }
.lvl-btn:hover { background: var(--color-background-tertiary); color: var(--color-text-primary); }
.lvl-btn.active { border-color: #00ff8880; background: #00ff8815; color: #00ff88; font-weight: 500; }
#sg-dpad { display: grid; grid-template-columns: repeat(3, 52px); grid-template-rows: repeat(3, 52px); gap: 5px; }
.dp-btn { display: flex; align-items: center; justify-content: center; border-radius: 10px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-primary); font-size: 22px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.08s, transform 0.06s; }
.dp-btn.pressed, .dp-btn:active { background: #00ff8820; border-color: #00ff8860; transform: scale(0.88); }
.dp-ghost { pointer-events: none; }
.dp-center { background: var(--color-background-secondary); border-radius: 10px; border: 0.5px solid var(--color-border-tertiary); opacity: 0.3; }
</style>

<div id="sg-wrap">
  <h2 class="sr-only">Neon Snake game</h2>
  <div id="sg-hud">
    <div class="sg-stat"><div class="sg-label">Score</div><div class="sg-value" id="sg-score">0</div></div>
    <div class="sg-stat"><div class="sg-label">Best</div><div class="sg-value" id="sg-hi">0</div></div>
    <div class="sg-stat"><div class="sg-label">Level</div><div class="sg-value" id="sg-lvl">1</div></div>
  </div>
  <canvas id="sg-canvas"></canvas>
  <div id="sg-msg">Choose a level and tap Play</div>
  <div id="sg-levels">
    <span>Speed:</span>
    <button class="lvl-btn active" data-speed="140">Chill</button>
    <button class="lvl-btn" data-speed="100">Normal</button>
    <button class="lvl-btn" data-speed="65">Fast</button>
    <button class="lvl-btn" data-speed="38">Insane</button>
  </div>
  <div id="sg-btns">
    <button id="btn-play">▶ Play</button>
    <button id="btn-pause">⏸ Pause</button>
  </div>
  <div id="sg-dpad">
    <div class="dp-ghost"></div>
    <div class="dp-btn" id="d-up">↑</div>
    <div class="dp-ghost"></div>
    <div class="dp-btn" id="d-left">←</div>
    <div class="dp-center"></div>
    <div class="dp-btn" id="d-right">→</div>
    <div class="dp-ghost"></div>
    <div class="dp-btn" id="d-down">↓</div>
    <div class="dp-ghost"></div>
  </div>
</div>

<script>
(function() {
  const COLS = 21, ROWS = 21;
  const canvas = document.getElementById('sg-canvas');
  const ctx = canvas.getContext('2d');

  const avail = Math.min((canvas.parentElement.clientWidth || 460) - 20, 480);
  const CELL = Math.floor(avail / COLS);
  const SIZE = CELL * COLS;
  canvas.width = SIZE;
  canvas.height = SIZE;

  // --- State ---
  let snake, dir, dirQueue, food, particles, score, hi, level, gameState, animId, lastTs;
  let msPerMove = 140; // base speed from level select
  let startSpeed = 140;
  let accumMs = 0;
  let interpT = 0; // 0..1 interpolation between steps
  hi = 0;

  const PC = ['#00ff88','#00ffcc','#88ffcc','#ffcc00','#ff8844'];

  // Level select
  document.querySelectorAll('.lvl-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      startSpeed = parseInt(btn.dataset.speed);
      msPerMove = startSpeed;
      if (gameState === 'idle' || gameState === 'dead') { initGame(); render(); }
    });
  });

  function initGame() {
    const mid = Math.floor(COLS / 2);
    snake = [
      {x:mid,   y:mid, px:mid-1, py:mid},
      {x:mid-1, y:mid, px:mid-2, py:mid},
      {x:mid-2, y:mid, px:mid-3, py:mid}
    ];
    dir = {x:1,y:0};
    dirQueue = [];
    particles = [];
    score = 0;
    level = 1;
    msPerMove = startSpeed;
    accumMs = 0;
    interpT = 0;
    placeFood();
    updateHUD();
  }

  function placeFood() {
    let p;
    do { p = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
    while (snake.some(s => s.x===p.x && s.y===p.y));
    food = {x:p.x, y:p.y, pulse:0};
  }

  function startGame() {
    if (gameState === 'dead' || gameState === 'idle') initGame();
    gameState = 'running';
    setMsg('');
    lastTs = null;
    if (animId) cancelAnimationFrame(animId);
    animId = requestAnimationFrame(mainLoop);
  }

  function pauseGame() {
    if (gameState === 'running') {
      gameState = 'paused';
      setMsg('Paused — tap Play to resume');
      if (animId) cancelAnimationFrame(animId);
      render();
    } else if (gameState === 'paused') {
      startGame();
    }
  }

  // Input queue — accept new dir immediately, queue up to 2
  function tryDir(nd) {
    if (nd.x === -dir.x && nd.y === -dir.y) return; // ignore reversal against current
    // Prevent queuing same direction twice
    const last = dirQueue.length ? dirQueue[dirQueue.length-1] : dir;
    if (nd.x === last.x && nd.y === last.y) return;
    if (nd.x === -last.x && nd.y === -last.y) return;
    if (dirQueue.length < 2) dirQueue.push(nd);
    if (gameState === 'idle' || gameState === 'dead') startGame();
  }

  function mainLoop(ts) {
    if (gameState !== 'running') return;
    if (!lastTs) lastTs = ts;
    const dt = Math.min(ts - lastTs, 100); // cap to avoid spiral
    lastTs = ts;

    food.pulse = (food.pulse + dt * 0.004) % (Math.PI * 2);

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt * 0.06; p.y += p.vy * dt * 0.06;
      p.vy += 0.004 * dt;
      p.life -= p.decay * dt * 0.06;
      p.r *= 0.99;
      if (p.life <= 0) particles.splice(i, 1);
    }

    accumMs += dt;

    // Step snake one or more times if behind
    while (accumMs >= msPerMove) {
      accumMs -= msPerMove;
      // Consume queued direction before each step
      if (dirQueue.length > 0) dir = dirQueue.shift();
      stepSnake();
      if (gameState !== 'running') { render(); return; }
    }

    // Smooth interpolation fraction 0..1
    interpT = accumMs / msPerMove;

    render();
    animId = requestAnimationFrame(mainLoop);
  }

  function stepSnake() {
    const newHead = {
      x: snake[0].x + dir.x,
      y: snake[0].y + dir.y,
      px: snake[0].x, // previous = old head
      py: snake[0].y
    };

    if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS ||
        snake.some(s => s.x === newHead.x && s.y === newHead.y)) {
      die(); return;
    }

    const ate = newHead.x === food.x && newHead.y === food.y;

    // Update prev positions for all segments
    const newSnake = [newHead];
    for (let i = 0; i < snake.length - (ate ? 0 : 1); i++) {
      newSnake.push({
        x: snake[i].x, y: snake[i].y,
        px: snake[i].px, py: snake[i].py
      });
    }
    snake = newSnake;

    if (ate) {
      score += 10 * level;
      if (score > hi) hi = score;
      spawnParticles(food.x, food.y, 16, false);
      level = Math.floor(score / 80) + 1;
      msPerMove = Math.max(35, startSpeed - (level - 1) * 12);
      placeFood();
      updateHUD();
    }
  }

  function die() {
    gameState = 'dead';
    spawnParticles(snake[0].x, snake[0].y, 30, true);
    setMsg('💀 Game over! Tap Play to restart.');
    if (animId) cancelAnimationFrame(animId);
    lastTs = null;
    function deathLoop(ts) {
      if (!lastTs) lastTs = ts;
      const dt = Math.min(ts - lastTs, 100); lastTs = ts;
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt * 0.06; p.y += p.vy * dt * 0.06;
        p.vy += 0.005 * dt; p.life -= p.decay * dt * 0.06; p.r *= 0.99;
        if (p.life <= 0) particles.splice(i, 1);
      }
      render();
      if (particles.length > 0) requestAnimationFrame(deathLoop);
      else render();
    }
    requestAnimationFrame(deathLoop);
  }

  function spawnParticles(gx, gy, count, burst) {
    const cx = gx * CELL + CELL/2, cy = gy * CELL + CELL/2;
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const spd = burst ? 1.5 + Math.random()*3.5 : 0.8 + Math.random()*2;
      particles.push({
        x:cx, y:cy, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
        life:1, decay: burst ? 0.012+Math.random()*0.015 : 0.018+Math.random()*0.02,
        r: burst ? 3+Math.random()*3 : 1.5+Math.random()*2,
        color: PC[Math.floor(Math.random()*PC.length)]
      });
    }
  }

  // Lerp helper
  function lerp(a, b, t) { return a + (b - a) * t; }
  // Ease in-out for interpolation
  function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

  function render() {
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0,0,W,H);

    // BG
    ctx.fillStyle = '#0a0f1a';
    ctx.beginPath(); ctx.roundRect(0,0,W,H,14); ctx.fill();

    // Grid
    ctx.fillStyle = '#ffffff09';
    for (let x=0; x<COLS; x++)
      for (let y=0; y<ROWS; y++)
        ctx.fillRect(x*CELL+1, y*CELL+1, CELL-2, CELL-2);

    // Food
    if (food) {
      const fx = food.x*CELL+CELL/2, fy = food.y*CELL+CELL/2;
      const pulse = 0.82 + 0.18*Math.sin(food.pulse);
      const gr = ctx.createRadialGradient(fx,fy,0,fx,fy,CELL*1.3*pulse);
      gr.addColorStop(0,'#ff446666'); gr.addColorStop(1,'transparent');
      ctx.fillStyle = gr;
      ctx.beginPath(); ctx.arc(fx,fy,CELL*1.3*pulse,0,Math.PI*2); ctx.fill();
      ctx.save();
      ctx.shadowBlur=10; ctx.shadowColor='#ff4466';
      ctx.fillStyle='#ff4466';
      const s = CELL*0.38*pulse;
      ctx.beginPath(); ctx.moveTo(fx,fy-s); ctx.lineTo(fx+s*0.8,fy+s*0.55); ctx.lineTo(fx-s*0.8,fy+s*0.55);
      ctx.closePath(); ctx.fill(); ctx.restore();
    }

    // Snake with interpolated positions
    const t = ease(Math.min(interpT, 1));
    for (let i = snake.length - 1; i >= 0; i--) {
      const seg = snake[i];
      // Interpolate from prev to current grid pos
      const rx = lerp(seg.px !== undefined ? seg.px : seg.x, seg.x, t);
      const ry = lerp(seg.py !== undefined ? seg.py : seg.y, seg.y, t);
      const cx2 = rx*CELL + CELL/2;
      const cy2 = ry*CELL + CELL/2;
      const hw = (CELL-3)/2, hh = (CELL-3)/2;
      const x = cx2 - hw, y = cy2 - hh, w = CELL-3, h = CELL-3;

      const frac = i / Math.max(snake.length-1, 1);
      ctx.save();
      if (i === 0) {
        ctx.shadowBlur = 16; ctx.shadowColor = '#00ff88';
        ctx.fillStyle = '#00ff88';
      } else {
        const g = Math.floor(220 - frac*110);
        const a = (1 - frac*0.45).toFixed(2);
        ctx.shadowBlur = 5; ctx.shadowColor = `rgba(0,${g},80,${a})`;
        ctx.fillStyle = `rgba(0,${g},80,${a})`;
      }
      const rad = i===0 ? Math.max(3, CELL*0.28) : Math.max(2, CELL*0.18);
      ctx.beginPath(); ctx.roundRect(x, y, w, h, rad); ctx.fill();

      // Eyes
      if (i === 0) {
        const d = dir;
        const eo = Math.max(3, CELL*0.2), es = Math.max(2, CELL*0.15);
        ctx.fillStyle = '#0a0f1a';
        if (d.x===1)  { ctx.fillRect(x+w-eo-es, y+eo, es, es); ctx.fillRect(x+w-eo-es, y+h-eo-es, es, es); }
        if (d.x===-1) { ctx.fillRect(x+eo, y+eo, es, es); ctx.fillRect(x+eo, y+h-eo-es, es, es); }
        if (d.y===-1) { ctx.fillRect(x+eo, y+eo, es, es); ctx.fillRect(x+w-eo-es, y+eo, es, es); }
        if (d.y===1)  { ctx.fillRect(x+eo, y+h-eo-es, es, es); ctx.fillRect(x+w-eo-es, y+h-eo-es, es, es); }
      }
      ctx.restore();
    }

    // Particles
    for (const p of particles) {
      ctx.save(); ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color; ctx.shadowBlur = 6; ctx.shadowColor = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.1, p.r), 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // Overlays
    if (gameState === 'idle' || gameState === 'dead') {
      ctx.fillStyle = 'rgba(10,15,26,0.8)';
      ctx.beginPath(); ctx.roundRect(0,0,W,H,14); ctx.fill();
      ctx.textAlign = 'center';
      ctx.shadowBlur=22; ctx.shadowColor='#00ff88'; ctx.fillStyle='#00ff88';
      ctx.font = `500 ${Math.round(CELL*1.45)}px sans-serif`;
      ctx.fillText(gameState==='dead'?'Game Over':'Neon Snake', W/2, H/2 - CELL*0.6);
      ctx.shadowBlur=0; ctx.fillStyle='#ffffffaa';
      ctx.font = `${Math.round(CELL*0.75)}px sans-serif`;
      ctx.fillText(gameState==='dead'?'Score: '+score:'Swipe · D-pad · Arrow keys', W/2, H/2+CELL*0.6);
      ctx.textAlign='left';
    }
    if (gameState === 'paused') {
      ctx.fillStyle='rgba(10,15,26,0.7)';
      ctx.beginPath(); ctx.roundRect(0,0,W,H,14); ctx.fill();
      ctx.textAlign='center';
      ctx.shadowBlur=16; ctx.shadowColor='#00ff88'; ctx.fillStyle='#00ff88';
      ctx.font=`500 ${Math.round(CELL*1.4)}px sans-serif`;
      ctx.fillText('Paused', W/2, H/2);
      ctx.shadowBlur=0; ctx.textAlign='left';
    }
  }

  function updateHUD() {
    document.getElementById('sg-score').textContent = score;
    document.getElementById('sg-hi').textContent = hi;
    document.getElementById('sg-lvl').textContent = level;
  }
  function setMsg(t) { document.getElementById('sg-msg').textContent = t; }

  // Keyboard — captured immediately, no debounce
  const keysDown = new Set();
  document.addEventListener('keydown', e => {
    if (keysDown.has(e.code)) return; // ignore key repeat
    keysDown.add(e.code);
    if (e.code === 'Space') {
      e.preventDefault();
      if (gameState==='idle'||gameState==='dead') startGame(); else pauseGame();
      return;
    }
    const map = { ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0},
                  KeyW:{x:0,y:-1}, KeyS:{x:0,y:1}, KeyA:{x:-1,y:0}, KeyD:{x:1,y:0} };
    const nd = map[e.code];
    if (nd) { e.preventDefault(); tryDir(nd); }
  });
  document.addEventListener('keyup', e => keysDown.delete(e.code));

  // D-pad
  [['d-up',0,-1],['d-down',0,1],['d-left',-1,0],['d-right',1,0]].forEach(([id,dx,dy]) => {
    const el = document.getElementById(id);
    el.addEventListener('pointerdown', e => { e.preventDefault(); el.classList.add('pressed'); tryDir({x:dx,y:dy}); });
    el.addEventListener('pointerup',    () => el.classList.remove('pressed'));
    el.addEventListener('pointerleave', () => el.classList.remove('pressed'));
  });

  document.getElementById('btn-play').addEventListener('click', () => {
    if (gameState==='idle'||gameState==='dead'||gameState==='paused') startGame();
  });
  document.getElementById('btn-pause').addEventListener('click', pauseGame);

  // Swipe
  let swipeStart = null;
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    swipeStart = {x:e.touches[0].clientX, y:e.touches[0].clientY};
  }, {passive:false});
  canvas.addEventListener('touchend', e => {
    if (!swipeStart) return;
    const dx = e.changedTouches[0].clientX - swipeStart.x;
    const dy = e.changedTouches[0].clientY - swipeStart.y;
    swipeStart = null;
    if (Math.abs(dx)<8 && Math.abs(dy)<8) {
      if (gameState==='idle'||gameState==='dead') startGame(); else pauseGame(); return;
    }
    if (Math.abs(dx) > Math.abs(dy)) tryDir({x:dx>0?1:-1, y:0});
    else tryDir({x:0, y:dy>0?1:-1});
  }, {passive:false});

  gameState = 'idle';
  initGame();
  render();
})();
</script>
