<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Neon Snake</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #0a0f1a; overflow: hidden; font-family: sans-serif; }
  #app { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0f1a; }
  #hud { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; z-index: 10; background: linear-gradient(#0a0f1acc, transparent); }
  .stat { text-align: center; }
  .stat-label { font-size: 10px; color: #ffffff55; text-transform: uppercase; letter-spacing: 0.1em; }
  .stat-value { font-size: 20px; font-weight: 500; color: #fff; font-variant-numeric: tabular-nums; }
  canvas { display: block; }
  #dpad { position: fixed; bottom: 18px; right: 18px; display: grid; grid-template-columns: repeat(3, 48px); grid-template-rows: repeat(3, 48px); gap: 5px; z-index: 10; }
  .dp { display: flex; align-items: center; justify-content: center; border-radius: 10px; border: 1px solid #ffffff18; background: #ffffff0a; color: #ffffffcc; font-size: 20px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.08s, transform 0.06s; }
  .dp.active { background: #00ff8825; border-color: #00ff8860; transform: scale(0.88); }
  .dp-ghost { pointer-events: none; }
  #level-btns { position: fixed; bottom: 22px; left: 18px; display: flex; flex-direction: column; gap: 6px; z-index: 10; }
  .lbtn { padding: 5px 13px; font-size: 11px; border-radius: 6px; border: 1px solid #ffffff20; background: #ffffff08; color: #ffffff66; cursor: pointer; transition: all 0.1s; -webkit-tap-highlight-color: transparent; }
  .lbtn:hover { background: #ffffff15; color: #ffffffaa; }
  .lbtn.active { border-color: #00ff8870; background: #00ff8818; color: #00ff88; font-weight: 500; }
  #pause-btn { position: fixed; top: 12px; right: 16px; font-size: 11px; padding: 4px 12px; border-radius: 6px; border: 1px solid #ffffff20; background: #ffffff08; color: #ffffff66; cursor: pointer; z-index: 20; -webkit-tap-highlight-color: transparent; }
  #pause-btn:hover { background: #ffffff15; color: #ffffffaa; }
  #overlay { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(10,15,26,0.82); z-index: 30; }
  #overlay h1 { font-size: clamp(28px, 6vw, 52px); font-weight: 500; color: #00ff88; text-shadow: 0 0 30px #00ff8888; margin-bottom: 8px; }
  #overlay p { font-size: clamp(13px, 2.5vw, 18px); color: #ffffff77; margin-bottom: 28px; }
  #overlay .score-big { font-size: clamp(22px, 4vw, 38px); color: #fff; font-weight: 500; margin-bottom: 6px; }
  #play-btn { padding: 12px 36px; font-size: 15px; border-radius: 10px; border: 1.5px solid #00ff8870; background: #00ff8818; color: #00ff88; cursor: pointer; font-weight: 500; transition: background 0.15s, transform 0.1s; }
  #play-btn:hover { background: #00ff8830; }
  #play-btn:active { transform: scale(0.96); }
  #speed-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .sbtn { padding: 6px 14px; font-size: 12px; border-radius: 6px; border: 1px solid #ffffff25; background: #ffffff0a; color: #ffffff66; cursor: pointer; transition: all 0.1s; }
  .sbtn.active { border-color: #00ff8870; background: #00ff8818; color: #00ff88; }
</style>
</head>
<body>
<div id="app">
  <canvas id="c"></canvas>
</div>

<div id="hud">
  <div class="stat"><div class="stat-label">Score</div><div class="stat-value" id="h-score">0</div></div>
  <div class="stat"><div class="stat-label">Level</div><div class="stat-value" id="h-lvl">1</div></div>
  <div class="stat"><div class="stat-label">Best</div><div class="stat-value" id="h-hi">0</div></div>
</div>

<button id="pause-btn">⏸ Pause</button>

<div id="dpad">
  <div class="dp-ghost"></div><div class="dp" id="du">↑</div><div class="dp-ghost"></div>
  <div class="dp" id="dl">←</div><div class="dp-ghost"></div><div class="dp" id="dr">→</div>
  <div class="dp-ghost"></div><div class="dp" id="dd">↓</div><div class="dp-ghost"></div>
</div>

<div id="level-btns">
  <div class="lbtn active" data-s="150">Chill</div>
  <div class="lbtn" data-s="100">Normal</div>
  <div class="lbtn" data-s="60">Fast</div>
  <div class="lbtn" data-s="35">Insane</div>
</div>

<div id="overlay">
  <h1 id="ov-title">Neon Snake</h1>
  <div class="score-big" id="ov-score" style="display:none"></div>
  <p id="ov-sub">Arrow keys · WASD · Swipe · D-pad</p>
  <div id="speed-row">
    <div class="sbtn active" data-s="150">Chill</div>
    <div class="sbtn" data-s="100">Normal</div>
    <div class="sbtn" data-s="60">Fast</div>
    <div class="sbtn" data-s="35">Insane</div>
  </div>
  <button id="play-btn">▶ Play</button>
</div>

<script>
(function(){
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const COLS = 25, ROWS = 25;
  let CW, CH, W, H;

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W; canvas.height = H;
    CW = W / COLS; CH = H / ROWS;
  }
  resize();
  window.addEventListener('resize', () => { resize(); if (gameState !== 'running') render(); });

  let snake, dir, dirQ, food, parts, score, hi=0, level, gameState='idle', animId, lastTs, accumMs, msPerMove, startSpeed=150, interpT=0;
  const PC = ['#00ff88','#00ffcc','#88ffcc','#ffcc00','#ff8844'];

  function init() {
    const mx=Math.floor(COLS/2), my=Math.floor(ROWS/2);
    snake=[{x:mx,y:my,px:mx-1,py:my},{x:mx-1,y:my,px:mx-2,py:my},{x:mx-2,y:my,px:mx-3,py:my}];
    dir={x:1,y:0}; dirQ=[]; parts=[]; score=0; level=1;
    msPerMove=startSpeed; accumMs=0; interpT=0;
    placeFood(); hudUpdate();
  }

  function placeFood() {
    let p;
    do { p={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}; }
    while(snake.some(s=>s.x===p.x&&s.y===p.y));
    food={x:p.x,y:p.y,pulse:0};
  }

  function startGame() {
    if(gameState==='dead'||gameState==='idle') init();
    gameState='running';
    document.getElementById('overlay').style.display='none';
    lastTs=null; if(animId) cancelAnimationFrame(animId);
    animId=requestAnimationFrame(loop);
  }

  function pauseGame() {
    if(gameState==='running'){
      gameState='paused';
      if(animId) cancelAnimationFrame(animId);
      showOverlay('Paused','Press Space or Play to continue',false);
    } else if(gameState==='paused') startGame();
  }

  function tryDir(nd) {
    const last=dirQ.length?dirQ[dirQ.length-1]:dir;
    if(nd.x===-last.x&&nd.y===-last.y) return;
    if(nd.x===last.x&&nd.y===last.y) return;
    if(dirQ.length<2) dirQ.push(nd);
    if(gameState==='idle'||gameState==='dead') startGame();
  }

  function loop(ts) {
    if(gameState!=='running') return;
    if(!lastTs) lastTs=ts;
    const dt=Math.min(ts-lastTs,100); lastTs=ts;
    food.pulse=(food.pulse+dt*0.004)%(Math.PI*2);
    tickParts(dt);
    accumMs+=dt;
    while(accumMs>=msPerMove) {
      accumMs-=msPerMove;
      if(dirQ.length>0) dir=dirQ.shift();
      step();
      if(gameState!=='running'){render();return;}
    }
    interpT=accumMs/msPerMove;
    render();
    animId=requestAnimationFrame(loop);
  }

  function step() {
    const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y,px:snake[0].x,py:snake[0].y};
    if(h.x<0||h.x>=COLS||h.y<0||h.y>=ROWS||snake.some(s=>s.x===h.x&&s.y===h.y)){die();return;}
    const ate=h.x===food.x&&h.y===food.y;
    const ns=[h];
    for(let i=0;i<snake.length-(ate?0:1);i++) ns.push({x:snake[i].x,y:snake[i].y,px:snake[i].px,py:snake[i].py});
    snake=ns;
    if(ate){
      score+=10*level; if(score>hi) hi=score;
      spawn(food.x,food.y,16,false);
      level=Math.floor(score/80)+1;
      msPerMove=Math.max(32,startSpeed-(level-1)*12);
      placeFood(); hudUpdate();
    }
  }

  function die() {
    gameState='dead'; spawn(snake[0].x,snake[0].y,32,true);
    if(animId) cancelAnimationFrame(animId); lastTs=null;
    showOverlay('Game Over','Score: '+score,true);
    function dl(ts){
      if(!lastTs) lastTs=ts;
      const dt=Math.min(ts-lastTs,100); lastTs=ts;
      tickParts(dt); render();
      if(parts.length>0) requestAnimationFrame(dl); else render();
    }
    requestAnimationFrame(dl);
  }

  function spawn(gx,gy,n,burst){
    const cx=gx*CW+CW/2, cy=gy*CH+CH/2;
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2, spd=burst?1.5+Math.random()*3.5:0.8+Math.random()*2;
      parts.push({x:cx,y:cy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
        life:1,decay:burst?0.012+Math.random()*0.015:0.018+Math.random()*0.02,
        r:burst?3+Math.random()*3:1.5+Math.random()*2,
        color:PC[Math.floor(Math.random()*PC.length)]});
    }
  }

  function tickParts(dt){
    for(let i=parts.length-1;i>=0;i--){
      const p=parts[i];
      p.x+=p.vx*dt*0.06; p.y+=p.vy*dt*0.06; p.vy+=0.004*dt;
      p.life-=p.decay*dt*0.06; p.r*=0.99;
      if(p.life<=0) parts.splice(i,1);
    }
  }

  function lerp(a,b,t){return a+(b-a)*t;}
  function ease(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}

  function render(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#0a0f1a'; ctx.fillRect(0,0,W,H);

    ctx.fillStyle='#ffffff07';
    for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++)
      ctx.fillRect(x*CW+0.5,y*CH+0.5,CW-1,CH-1);

    if(food){
      const fx=food.x*CW+CW/2, fy=food.y*CH+CH/2, pulse=0.82+0.18*Math.sin(food.pulse);
      const gr=ctx.createRadialGradient(fx,fy,0,fx,fy,CW*1.4*pulse);
      gr.addColorStop(0,'#ff446655'); gr.addColorStop(1,'transparent');
      ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(fx,fy,CW*1.4*pulse,0,Math.PI*2); ctx.fill();
      ctx.save(); ctx.shadowBlur=12; ctx.shadowColor='#ff4466'; ctx.fillStyle='#ff4466';
      const s=CW*0.38*pulse;
      ctx.beginPath(); ctx.moveTo(fx,fy-s); ctx.lineTo(fx+s*0.8,fy+s*0.55); ctx.lineTo(fx-s*0.8,fy+s*0.55);
      ctx.closePath(); ctx.fill(); ctx.restore();
    }

    const et=ease(Math.min(interpT,1));
    for(let i=snake.length-1;i>=0;i--){
      const seg=snake[i];
      const rx=lerp(seg.px!==undefined?seg.px:seg.x,seg.x,et);
      const ry=lerp(seg.py!==undefined?seg.py:seg.y,seg.y,et);
      const sx=rx*CW+1.5, sy=ry*CH+1.5, sw=CW-3, sh=CH-3;
      const frac=i/Math.max(snake.length-1,1);
      ctx.save();
      if(i===0){ctx.shadowBlur=18;ctx.shadowColor='#00ff88';ctx.fillStyle='#00ff88';}
      else{
        const g=Math.floor(220-frac*110);
        ctx.shadowBlur=5; ctx.shadowColor=`rgba(0,${g},80,${(1-frac*0.45).toFixed(2)})`;
        ctx.fillStyle=`rgba(0,${g},80,${(1-frac*0.45).toFixed(2)})`;
      }
      ctx.beginPath(); ctx.roundRect(sx,sy,sw,sh,i===0?Math.max(3,CW*0.28):Math.max(2,CW*0.18)); ctx.fill();
      if(i===0){
        const eo=Math.max(3,CW*0.2),es=Math.max(2,CW*0.15);
        ctx.fillStyle='#0a0f1a';
        if(dir.x===1){ctx.fillRect(sx+sw-eo-es,sy+eo,es,es);ctx.fillRect(sx+sw-eo-es,sy+sh-eo-es,es,es);}
        if(dir.x===-1){ctx.fillRect(sx+eo,sy+eo,es,es);ctx.fillRect(sx+eo,sy+sh-eo-es,es,es);}
        if(dir.y===-1){ctx.fillRect(sx+eo,sy+eo,es,es);ctx.fillRect(sx+sw-eo-es,sy+eo,es,es);}
        if(dir.y===1){ctx.fillRect(sx+eo,sy+sh-eo-es,es,es);ctx.fillRect(sx+sw-eo-es,sy+sh-eo-es,es,es);}
      }
      ctx.restore();
    }

    for(const p of parts){
      ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
      ctx.fillStyle=p.color; ctx.shadowBlur=6; ctx.shadowColor=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0.1,p.r),0,Math.PI*2); ctx.fill(); ctx.restore();
    }
  }

  function showOverlay(title, sub, showScore) {
    const ov=document.getElementById('overlay');
    document.getElementById('ov-title').textContent=title;
    document.getElementById('ov-sub').textContent=sub;
    const sc=document.getElementById('ov-score');
    if(showScore){ sc.style.display='block'; sc.textContent='Score: '+score+'  ·  Best: '+hi; }
    else sc.style.display='none';
    ov.style.display='flex';
  }

  function hudUpdate(){
    document.getElementById('h-score').textContent=score;
    document.getElementById('h-hi').textContent=hi;
    document.getElementById('h-lvl').textContent=level;
  }

  function setSpeed(s){
    startSpeed=s; msPerMove=s;
    document.querySelectorAll('.sbtn,.lbtn').forEach(b=>{
      b.classList.toggle('active', parseInt(b.dataset.s)===s);
    });
  }
  document.querySelectorAll('.sbtn,.lbtn').forEach(b=>{
    b.addEventListener('click',()=>setSpeed(parseInt(b.dataset.s)));
  });

  const keysDown=new Set();
  document.addEventListener('keydown',e=>{
    if(keysDown.has(e.code)) return; keysDown.add(e.code);
    if(e.code==='Space'){e.preventDefault();if(gameState==='idle'||gameState==='dead') startGame(); else pauseGame();return;}
    if(e.code==='Escape'){e.preventDefault();pauseGame();return;}
    const map={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
               KeyW:{x:0,y:-1},KeyS:{x:0,y:1},KeyA:{x:-1,y:0},KeyD:{x:1,y:0}};
    const nd=map[e.code]; if(nd){e.preventDefault();tryDir(nd);}
  });
  document.addEventListener('keyup',e=>keysDown.delete(e.code));

  [['du',0,-1],['dd',0,1],['dl',-1,0],['dr',1,0]].forEach(([id,dx,dy])=>{
    const el=document.getElementById(id);
    el.addEventListener('pointerdown',e=>{e.preventDefault();el.classList.add('active');tryDir({x:dx,y:dy});});
    el.addEventListener('pointerup',()=>el.classList.remove('active'));
    el.addEventListener('pointerleave',()=>el.classList.remove('active'));
  });

  document.getElementById('play-btn').addEventListener('click', startGame);
  document.getElementById('pause-btn').addEventListener('click', pauseGame);

  let sw=null;
  document.addEventListener('touchstart',e=>{
    const t=e.touches[0]; sw={x:t.clientX,y:t.clientY};
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(!sw) return;
    const dx=e.changedTouches[0].clientX-sw.x, dy=e.changedTouches[0].clientY-sw.y; sw=null;
    if(Math.abs(dx)<12&&Math.abs(dy)<12) return;
    if(Math.abs(dx)>Math.abs(dy)) tryDir({x:dx>0?1:-1,y:0});
    else tryDir({x:0,y:dy>0?1:-1});
  },{passive:true});

  gameState='idle';
  init(); render();
  showOverlay('Neon Snake','Arrow keys · WASD · Swipe · D-pad',false);
})();
</script>
</body>
</html>
